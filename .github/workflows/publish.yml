name: Build and publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        # ubuntu-22.04: Linux x86_64
        # macos-14: macOS arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Target architectures
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: native

          # Use manylinux_2_28 for broader glibc compatibility
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Skip Python 3.8, PyPy, and musllinux
          CIBW_SKIP: "cp38-* pp* *-musllinux*"

          # Install system dependencies and build Aster (Linux - inside manylinux container)
          # Note: AlmaLinux 8 uses libzstd-devel (not zstd-devel), and needs EPEL for some packages
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y epel-release &&
            yum install -y libzstd-devel snappy-devel lz4-devel bzip2-devel
            zlib-devel boost-devel &&
            cd {project} && make aster

          # Install system dependencies and build Aster (macOS)
          # Export MACOSX_DEPLOYMENT_TARGET before building to avoid std::optional::value() availability errors
          CIBW_BEFORE_ALL_MACOS: >
            brew install zstd snappy lz4 boost &&
            export MACOSX_DEPLOYMENT_TARGET=10.14 &&
            cd {project} &&
            make -C lib/aster static_lib -j$(sysctl -n hw.ncpu) DEBUG_LEVEL=0
            DISABLE_WARNING_AS_ERROR=1
            EXTRA_CXXFLAGS="-fPIC -I$(brew --prefix boost)/include"

          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.14"

          # Pass both Python build and static linking flags
          CIBW_CONFIG_SETTINGS: "cmake.args=-DLSMVEC_BUILD_PYTHON=ON;-DLSMVEC_PYTHON_STATIC=ON"

          # Bundle shared libs into wheels
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs}
            -w {dest_dir} -v {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
