name: Build and publish AsterVec wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            arch: x86_64
          - name: macos-arm64
            os: macos-14
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.arch }}

          # Use manylinux_2_28 for broader glibc compatibility
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # AsterVec supports CPython 3.9+.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux*"

          # AsterVec 0.2.0 builds Aster zstd-only. Do not install/link snappy,
          # lz4, bzip2, or zlib for the wheel build.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y epel-release &&
            yum install -y libzstd-devel boost-devel &&
            cd {project} && make aster

          CIBW_BEFORE_ALL_MACOS: >
            brew install zstd boost jemalloc &&
            export MACOSX_DEPLOYMENT_TARGET=14.0 &&
            export CPATH="$(brew --prefix)/include" &&
            cd {project} &&
            make aster

          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=14.0"

          # Build only the Python extension for wheels, linked statically.
          CIBW_CONFIG_SETTINGS: "cmake.args=-DASTERVEC_BUILD_PYTHON=ON;-DASTERVEC_PYTHON_STATIC=ON;-DASTERVEC_BUILD_HTTP=OFF;-DASTERVEC_BUILD_UNIT_TESTS=OFF"

          CIBW_TEST_COMMAND: "python -c \"import astervec; print(astervec.__name__)\""

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair -w {dest_dir} {wheel}

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            python -m pip install delocate &&
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
